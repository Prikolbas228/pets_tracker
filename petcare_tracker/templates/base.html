<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 PetCare Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f0f12;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #16161c;
            border-right: 1px solid #222230;
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            position: fixed;
            height: 100vh;
            flex-shrink: 0;
        }

        .sidebar-logo {
            padding: 0 20px 24px;
            border-bottom: 1px solid #222230;
        }

        .sidebar-logo h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .sidebar-logo span {
            font-size: 11px;
            color: #555568;
        }

        .sidebar-nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            color: #888899;
            font-size: 13px;
            font-weight: 400;
            text-decoration: none;
            margin-bottom: 2px;
            transition: all 0.15s;
        }

        .nav-link:hover {
            background: #1e1e2e;
            color: #e8e8f0;
        }

        .nav-link.active {
            background: #1e1e2e;
            color: #a78bfa;
            font-weight: 600;
        }

        .nav-icon { font-size: 14px; }

        .sidebar-user {
            padding: 16px 12px;
            border-top: 1px solid #222230;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            background: #1e1e2e;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .user-name { font-size: 12px; font-weight: 600; color: #e8e8f0; }
        .user-plan { font-size: 10px; color: #555568; }

        /* MAIN CONTENT */
        .main-wrapper {
            margin-left: 220px;
            flex: 1;
            padding: 32px;
            min-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .page-subtitle {
            font-size: 13px;
            color: #555568;
            margin-top: 4px;
        }

        /* CARDS */
        .card-dark {
            background: #16161c;
            border: 1px solid #222230;
            border-radius: 14px;
            padding: 20px 24px;
        }

        .card-label {
            font-size: 11px;
            font-weight: 600;
            color: #555568;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        /* BUTTONS */
        .btn-primary-custom {
            background: linear-gradient(135deg, #a78bfa, #6366f1);
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.15s;
        }

        .btn-primary-custom:hover { opacity: 0.9; color: #fff; }

        .btn-secondary-custom {
            background: #1e1e2e;
            border: 1px solid #2d2d42;
            border-radius: 8px;
            padding: 8px 14px;
            color: #a78bfa;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .btn-secondary-custom:hover { background: #252538; color: #a78bfa; }

        /* FORMS */
        .form-card {
            background: #16161c;
            border: 1px solid #222230;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            margin: 0 auto;
        }

        .form-card h2 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888899;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #0f0f12;
            border: 1px solid #2d2d42;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e8e8f0;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.15s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #a78bfa;
        }

        .form-group select option { background: #16161c; }

        .form-error {
            font-size: 11px;
            color: #f87171;
            margin-top: 4px;
        }

        /* STAT CARDS */
        .stat-card {
            background: #16161c;
            border: 1px solid #222230;
            border-radius: 14px;
            padding: 20px 24px;
        }

        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 13px; color: #e8e8f0; margin-top: 2px; }
        .stat-sub { font-size: 11px; color: #555568; margin-top: 2px; }

        /* PET CARD */
        .pet-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 6px;
            text-decoration: none;
            color: inherit;
            transition: all 0.15s;
        }

        .pet-card:hover {
            background: #1e1e2e;
            border-color: #2d2d42;
            color: inherit;
        }

        .pet-emoji-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #0f0f18;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .pet-badge {
            font-size: 11px;
            color: #a78bfa;
            background: #1e1832;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* LOG ITEM */
        .log-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a26;
        }

        .log-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #a78bfa;
            margin-top: 6px;
            flex-shrink: 0;
        }

        /* ACTION BUTTONS */
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #222230;
            background: #0f0f12;
            color: #888899;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 8px;
            transition: all 0.15s;
        }

        .action-btn:hover {
            border-color: #a78bfa;
            color: #a78bfa;
            background: #1e1832;
        }

        /* ALERTS */
        .alert-custom {
            background: #1e1832;
            border: 1px solid #a78bfa33;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #a78bfa;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
{% if user.is_authenticated %}
<aside class="sidebar">
    <div class="sidebar-logo">
        <h1>🐾 PetCare</h1>
        <span>tracker</span>
    </div>
    <nav class="sidebar-nav">
        <a href="{% url 'pet_list' %}" class="nav-link {% if request.resolver_match.url_name == 'pet_list' %}active{% endif %}">
            <span class="nav-icon">◈</span> Дашборд
        </a>
        <a href="{% url 'pet_add' %}" class="nav-link {% if request.resolver_match.url_name == 'pet_add' %}active{% endif %}">
            <span class="nav-icon">◉</span> Питомцы
        </a>
        <a href="{% url 'reminder_list' %}" class="nav-link {% if request.resolver_match.url_name == 'reminder_list' %}active{% endif %}">
            <span class="nav-icon">◎</span> Напоминания
        </a>
    </nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar">{{ user.username|first|upper }}</div>
            <div>
                <div class="user-name">{{ user.username }}</div>
                <div class="user-plan"><a href="{% url 'logout' %}" style="color:#555568; text-decoration:none;">Выйти</a></div>
            </div>
        </div>
    </div>
</aside>
{% endif %}

<div class="main-wrapper" {% if not user.is_authenticated %}style="margin-left:0;"{% endif %}>
    {% if messages %}
        {% for message in messages %}
            <div class="alert-custom">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
