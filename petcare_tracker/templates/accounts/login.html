{% extends 'base.html' %}
{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:80vh;">
    <div class="form-card" style="width:100%;">
        <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:40px; margin-bottom:12px;">🐾</div>
            <h2 style="margin-bottom:4px;">С возвращением</h2>
            <p style="font-size:13px; color:#555568;">Войдите в свой аккаунт</p>
        </div>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="form-error">{{ field.errors|join:", " }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn-primary-custom" style="width:100%; justify-content:center; margin-top:8px;">
                Войти
            </button>
        </form>
        <p style="text-align:center; font-size:13px; color:#555568; margin-top:20px;">
            Нет аккаунта? <a href="{% url 'register' %}" style="color:#a78bfa;">Регистрация</a>
        </p>
    </div>
</div>
{% endblock %}
