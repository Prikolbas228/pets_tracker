{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <div>
        <div class="page-title">Новое напоминание</div>
        <div class="page-subtitle">Питомец: {{ pet.name }}</div>
    </div>
    <a href="{% url 'pet_detail' pet.pk %}" class="btn-secondary-custom">← Назад</a>
</div>

<div class="form-card" style="max-width:520px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div class="form-error">{{ field.errors|join:", " }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn-primary-custom" style="width:100%; justify-content:center; margin-top:8px;">
            Сохранить
        </button>
    </form>
</div>
{% endblock %}
